server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:mem:demosales
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2-console

agent-framework:
  llm:
    api-key: ${DEEPSEEK_API_KEY}
    model: deepseek-v4-flash
    base-url: https://api.deepseek.com/v1
  plugin:
    database:
      enabled: true
      auto-discover: false
      dialect: h2
      include-tables:
        - orders
        - products
      column-descriptions:
        orders.status: "paid=已支付, pending=待支付, cancelled=已取消"
        orders.region: "华南/华东/华北/西南/西北"
        products.stock: "库存数量"
        orders.order_date: "DATE类型，查询时用 YYYY-MM-DD 格式，不要用时间戳"
        orders.amount: "订单金额，DECIMAL类型"
    knowledge:
      enabled: true
      chunker: simple
      embedder:
        api-key: ${EMBEDDING_API_KEY:}
        model: text-embedding-3-small
        base-url: https://api.openai.com/v1

